<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ff00aa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Speed Moto">
  <title>Speed Motoboy</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.jpg">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Lucide & Supabase -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #ff00aa;
      --primary-glow: rgba(255,0,170,0.15);
      --success: #10b981;
      --success-glow: rgba(16,185,129,0.15);
      --warning: #f59e0b;
      --error: #ef4444;
      --bg: #09090b;
      --bg-card: #181820;
      --bg-input: #1a1a24;
      --border: #272732;
      --text: #f4f4f5;
      --muted: #8e8e9f;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display: 'Outfit', 'Inter', sans-serif;
      --radius: 14px;
      --nav-h: 68px;
      --header-h: 60px;
    }

    html, body {
      height: 100%;
      width: 100%;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    /* ── LOGIN SCREEN ── */
    #pwa-login {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,0,170,0.12) 0%, transparent 70%), var(--bg);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .login-logo img {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      object-fit: cover;
    }

    .login-logo-text {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .login-logo-text span { color: var(--primary); }

    .login-tagline {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 36px;
      text-align: center;
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }

    .login-card h2 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .login-card p {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: var(--primary); }

    .form-group input[type="password"] {
      letter-spacing: 4px;
      font-size: 1.2rem;
    }

    .pwa-btn-block {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .pwa-btn-block:active { transform: scale(0.98); }
    .pwa-btn-block:disabled { opacity: 0.6; cursor: not-allowed; }

    .login-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: var(--error);
      font-size: 0.82rem;
      padding: 10px 14px;
      margin-top: 14px;
      text-align: center;
    }

    /* ── APP SCREEN ── */
    #pwa-app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* Header */
    .pwa-header {
      height: var(--header-h);
      background: #0d0d11;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
      gap: 10px;
    }

    .pwa-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pwa-header-logo {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 800;
    }

    .pwa-header-logo span { color: var(--primary); }

    .pwa-rider-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #pwa-rider-name {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .pwa-status-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      width: fit-content;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-available { background: rgba(16,185,129,0.15); color: #10b981; }
    .badge-busy      { background: rgba(255,0,170,0.15);  color: #ff00aa; }
    .badge-rest      { background: rgba(142,142,159,0.15); color: #8e8e9f; }

    .pwa-logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .pwa-logout-btn svg { width: 14px; height: 14px; }

    /* Main content */
    .pwa-main {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .pwa-tab {
      height: 100%;
      overflow-y: auto;
      padding: 16px;
      padding-bottom: calc(var(--nav-h) + 8px);
    }

    #pwa-tab-map {
      padding: 0;
    }

    #pwa-map {
      height: 100%;
      width: 100%;
    }

    /* Bottom Navigation */
    .pwa-bottom-nav {
      height: var(--nav-h);
      background: #0d0d11;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }

    .pwa-nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.7rem;
      font-weight: 500;
      padding: 10px 0;
      transition: color 0.2s;
    }

    .pwa-nav-btn svg { width: 22px; height: 22px; }

    .pwa-nav-btn.active {
      color: var(--primary);
    }

    .pwa-nav-btn.active svg {
      filter: drop-shadow(0 0 6px rgba(255,0,170,0.5));
    }

    /* Tele cards */
    .pwa-tele-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .pwa-tele-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .pwa-tele-id {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
    }

    .pwa-tele-status {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .status-progress { background: rgba(255,0,170,0.12); color: #ff00aa; }
    .status-success  { background: rgba(16,185,129,0.12); color: #10b981; }

    .pwa-tele-body { padding: 12px 16px; }

    .pwa-tele-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 6px;
    }

    .pwa-tele-row svg { flex-shrink: 0; margin-top: 2px; color: var(--muted); }

    .pwa-tele-meta {
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .pwa-tele-meta strong { color: var(--text); }
    .pwa-highlight { color: var(--primary) !important; }

    .pwa-tele-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .pwa-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      padding: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .pwa-btn:active { transform: scale(0.98); }
    .pwa-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .pwa-btn-primary { background: var(--primary); color: #fff; }
    .pwa-btn-success { background: var(--success); color: #fff; }

    .pwa-tele-waiting {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      display: block;
    }

    /* Empty & loading states */
    .pwa-empty-state {
      text-align: center;
      padding: 56px 24px;
      color: var(--muted);
    }

    .pwa-empty-state svg {
      margin-bottom: 16px;
      opacity: 0.3;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .pwa-empty-state p {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .pwa-empty-state span {
      font-size: 0.85rem;
    }

    .pwa-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 60px 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .pwa-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Leaflet dark overrides */
    .leaflet-container { background: #0d0d11; }
    .leaflet-popup-content-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      color: var(--text);
    }
    .leaflet-popup-tip { background: var(--bg-card); }
    .leaflet-popup-close-button { color: var(--muted) !important; }

    /* Safe area for notch phones */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .pwa-bottom-nav {
        padding-bottom: env(safe-area-inset-bottom);
        height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      }
    }

    /* Connect button and layout */
    .pwa-connect-container {
      padding: 16px;
      background: #0d0d11;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .pwa-btn-connect {
      width: 100%;
      background: #3f3f46; /* Sleek zinc-600 grey */
      color: #ffffff;
      border: 1px solid transparent;
      border-radius: 10px;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .pwa-btn-connect:active {
      transform: scale(0.98);
    }

    .pwa-btn-connect.online {
      background: #18181b; /* Darker grey when online */
      border-color: var(--primary);
    }

    /* Floating Menu Button */
    .pwa-menu-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 900;
      transition: transform 0.1s, background-color 0.2s, border-color 0.2s;
    }

    .pwa-menu-btn:active {
      transform: scale(0.95);
    }

    .pwa-menu-btn:hover {
      border-color: var(--primary);
    }

    .pwa-menu-btn svg {
      width: 24px;
      height: 24px;
    }

    /* Drawer Styles */
    .pwa-drawer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2000;
      display: flex;
      justify-content: flex-end;
      visibility: hidden;
      transition: visibility 0.3s;
    }

    .pwa-drawer.active {
      visibility: visible;
    }

    .pwa-drawer-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .pwa-drawer.active .pwa-drawer-overlay {
      opacity: 1;
    }

    .pwa-drawer-content {
      position: relative;
      width: 280px;
      height: 100%;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 2010;
    }

    .pwa-drawer.active .pwa-drawer-content {
      transform: translateX(0);
    }

    .pwa-drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .pwa-drawer-profile {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary-glow);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .avatar-circle svg {
      width: 20px;
      height: 20px;
    }

    .pwa-drawer-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pwa-drawer-nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pwa-drawer-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 16px;
      background: none;
      border: 1px solid transparent;
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .pwa-drawer-item svg {
      width: 18px;
      height: 18px;
      color: var(--muted);
      transition: color 0.2s;
    }

    .pwa-drawer-item:hover, .pwa-drawer-item:active {
      background: var(--bg-input);
      border-color: var(--border);
      color: #ffffff;
    }

    .pwa-drawer-item:hover svg, .pwa-drawer-item:active svg {
      color: var(--primary);
    }

    .pwa-drawer-item.active {
      background: var(--primary-glow);
      border-color: rgba(255, 0, 170, 0.2);
      color: var(--primary);
      font-weight: 600;
    }

    .pwa-drawer-item.active svg {
      color: var(--primary);
    }

    .pwa-drawer-logout {
      margin-top: 24px;
      color: var(--error);
    }

    .pwa-drawer-logout:hover, .pwa-drawer-logout:active {
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.2);
      color: var(--error);
    }

    .pwa-drawer-logout:hover svg, .pwa-drawer-logout:active svg {
      color: var(--error);
    }

    /* Make tab contents take 100% height when not using bottom nav */
    .pwa-tab {
      padding-bottom: 24px !important;
    }
  </style>
</head>
<body>

  <!-- ── LOGIN SCREEN ── -->
  <div id="pwa-login">
    <div class="login-logo">
      <img src="logo.jpg" alt="Logo Speed">
      <span class="login-logo-text">SPEED<span>.</span></span>
    </div>
    <p class="login-tagline">Portal exclusivo para entregadores</p>

    <div class="login-card">
      <h2>Entrar como Motoboy</h2>
      <p>Use seu ID e PIN fornecidos pelo administrador.</p>

      <form onsubmit="handleMotoLogin(event)">
        <div class="form-group">
          <label>Seu ID</label>
          <input type="text" id="moto-id" required placeholder="Ex: MB-001" autocomplete="off" autocapitalize="characters">
        </div>
        <div class="form-group">
          <label>PIN (4 dígitos)</label>
          <input type="password" id="moto-pin" required placeholder="••••" maxlength="4" inputmode="numeric" autocomplete="current-password">
        </div>
        <button type="submit" class="pwa-btn-block" id="login-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Entrar
        </button>
        <div id="login-error" class="login-error hidden"></div>
      </form>
    </div>
  </div>

  <!-- ── APP SCREEN ── -->
  <div id="pwa-app" class="hidden">

    <!-- Header -->
    <header class="pwa-header">
      <div class="pwa-header-left">
        <span class="pwa-header-logo">SPEED<span>.</span></span>
        <div class="pwa-rider-info">
          <span id="pwa-rider-name">Motoboy</span>
          <span id="pwa-rider-status" class="pwa-status-badge badge-available">Disponível</span>
        </div>
      </div>
      <button class="pwa-logout-btn" onclick="handleMotoLogout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </header>

    <!-- Main content area -->
    <main class="pwa-main">

      <!-- Teles Tab -->
      <div id="pwa-tab-teles" class="pwa-tab">
        <div id="pwa-teles-container">
          <!-- rendered by JS -->
        </div>
      </div>

      <!-- Map Tab -->
      <div id="pwa-tab-map" class="pwa-tab hidden" style="display: flex; flex-direction: column; height: 100%;">
        <div id="pwa-map" style="flex: 1; width: 100%;"></div>
        <div class="pwa-connect-container">
          <button id="pwa-connect-btn" class="pwa-btn-connect" onclick="toggleConnectionState()">Conectar</button>
        </div>
      </div>

    </main>

    <!-- Floating Menu Button -->
    <button id="pwa-menu-btn" class="pwa-menu-btn" onclick="togglePWADrawer(true)">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <!-- Drawer Navigation Menu -->
    <div id="pwa-drawer" class="pwa-drawer">
      <div class="pwa-drawer-overlay" onclick="togglePWADrawer(false)"></div>
      <div class="pwa-drawer-content">
        <div class="pwa-drawer-header">
          <div class="pwa-drawer-profile">
            <div class="avatar-circle">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div>
              <h4 id="drawer-rider-name">Motoboy</h4>
              <p id="drawer-rider-id" style="font-size: 0.75rem; color: var(--muted); margin-top: 2px;">#MB-0000</p>
            </div>
          </div>
          <button class="pwa-drawer-close" onclick="togglePWADrawer(false)">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <nav class="pwa-drawer-nav">
          <button class="pwa-drawer-item active" id="pwa-nav-map" onclick="handleDrawerNav('map')">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            Mapa / Início
          </button>
          <button class="pwa-drawer-item" id="pwa-nav-teles" onclick="handleDrawerNav('teles')">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            Minhas Teles
          </button>
          <button class="pwa-drawer-item pwa-drawer-logout" onclick="handleDrawerLogout()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sair da Conta
          </button>
        </nav>
      </div>
    </div>

  </div>
